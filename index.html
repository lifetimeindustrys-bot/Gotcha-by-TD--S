<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;background:black;">

<video autoplay muted playsinline controls style="width:100%;height:100%;">
  <source src="https://rickroll.it/rickroll.mp4" type="video/mp4">
</video>

<script>
  const v = document.querySelector("video");
  v.play().catch(() => {
    v.muted = true;
    v.play();
  });
</script>

</body>
</html>
